<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คลังยา - ระบบตรวจนับและตัดจ่ายยาเสพติดให้โทษ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/png" href="icon-app.png">
  <link rel="apple-touch-icon" href="icon-app.png">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <!-- DataTables CSS -->
  <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar Placeholder -->
  <div id="navbar-placeholder"></div>

  <div class="main-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="mb-1 text-primary"><i class="fas fa-boxes-stacked me-2"></i>ระบบรับเข้าและจัดการคลังยา</h2>
        <p class="text-secondary mb-0">บันทึกรับเข้าคลังยาเสพติดให้โทษและแสดงรายการยอดคงเหลือปัจจุบัน</p>
      </div>
      <!-- เฉพาะ Admin สามารถบันทึกรับเข้ายาได้ (หรือตาม Role ที่ระบุ) -->
      <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addStockModal" id="btn-open-receive-modal">
        <i class="fas fa-plus me-1"></i> รับเข้ายาเสพติด
      </button>
    </div>

    <!-- Stock Data Table -->
    <div class="card border-0 shadow-sm p-4" style="border-radius: 12px;">
      <div class="table-responsive">
        <table id="stock-table" class="table table-hover align-middle w-100 mb-0 stack-table-mobile">
          <thead>
            <tr>
              <th>รหัสสต็อก</th>
              <th>ชื่อยา</th>
              <th>LOT</th>
              <th>วันหมดอายุ</th>
              <th>จำนวนรับเข้า</th>
              <th>คงเหลือ</th>
              <th>วันที่รับเข้า</th>
              <th>ผู้บันทึก</th>
              <th>สถานะยา</th>
            </tr>
          </thead>
          <tbody id="stock-tbody">
            <!-- ข้อมูลจะโหลดเข้าด้วย JavaScript -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal: รับเข้ายาเสพติด -->
  <div class="modal fade" id="addStockModal" tabindex="-1" aria-labelledby="addStockModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius: 12px; overflow: hidden;">
        <div class="modal-header" style="background-color: var(--primary-color); color: white;">
          <h5 class="modal-title" id="addStockModalLabel"><i class="fas fa-file-invoice me-2"></i>แบบฟอร์มรับเข้ายาเสพติด</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="add-stock-form">
          <div class="modal-body p-4">
            <div class="row g-3">
              <div class="col-12">
                <label for="drug-name-input" class="form-label">ชื่อยาเสพติด (เลือกจาก Drug Master)</label>
                <select class="form-select" id="drug-name-input" required>
                  <option value="" selected disabled>กำลังโหลดรายการยา...</option>
                </select>
                <div class="form-text">เลือกชื่อยาจากรายการกลาง ระบบจะช่วยกรอกความแรงและหน่วยให้อัตโนมัติ</div>
              </div>
              <div class="col-md-6">
                <label for="drug-strength-input" class="form-label">ความแรง</label>
                <input type="text" class="form-control" id="drug-strength-input" placeholder="ระบบจะดึงจาก Drug Master" readonly required>
              </div>
              <div class="col-md-6">
                <label for="drug-unit-input" class="form-label">หน่วยนับ</label>
                <input type="text" class="form-control" id="drug-unit-input" placeholder="ระบบจะดึงจาก Drug Master" readonly required>
              </div>
              <div class="col-md-6">
                <label for="lot-input" class="form-label">LOT (เลขที่ผลิต)</label>
                <input type="text" class="form-control" id="lot-input" placeholder="กรอก Lot Number" required>
              </div>
              <div class="col-md-6">
                <label for="expiry-date-input" class="form-label">วันหมดอายุ</label>
                <input type="date" class="form-control" id="expiry-date-input" required>
              </div>
              <div class="col-md-6">
                <label for="qty-receive-input" class="form-label">จำนวนรับเข้า</label>
                <input type="number" min="1" step="any" class="form-control" id="qty-receive-input" placeholder="เช่น 50" required>
              </div>
              <div class="col-md-6">
                <label for="receive-date-input" class="form-label">วันที่รับเข้า</label>
                <input type="date" class="form-control" id="receive-date-input" required>
              </div>
              <div class="col-12">
                <label for="created-by-input" class="form-label">ผู้บันทึก</label>
                <input type="text" class="form-control" id="created-by-input" placeholder="กรอกชื่อผู้บันทึก" required>
              </div>
            </div>
          </div>
          <div class="modal-footer bg-light p-3">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
            <button type="submit" class="btn btn-primary-custom"><i class="fas fa-save me-1"></i>บันทึกรับเข้า</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Loading Spinner -->
  <div id="loading-spinner-overlay" class="d-none">
    <div class="spinner-border spinner-custom" role="status">
      <span class="visually-hidden">กำลังโหลด...</span>
    </div>
  </div>

  <!-- JQuery & Bootstrap & Datatables & Sweetalert2 -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="api.js"></script>
  <script src="app.js"></script>
  <script src="fixes.js"></script>
</body>
</html>
