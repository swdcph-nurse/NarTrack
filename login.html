<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    window.location.replace("dashboard.html");
  </script>
  <title>เข้าสู่ระบบ - ระบบตรวจนับและตัดจ่ายยาเสพติดให้โทษ</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="text-center mb-4">
      <div class="text-primary fs-1 mb-2">
        <i class="fas fa-hospital-user"></i>
      </div>
      <h3 class="mb-1 text-primary">ระบบยาเสพติดหอผู้ป่วย</h3>
      <p class="text-muted small">กรุณาเข้าสู่ระบบเพื่อปฏิบัติงาน</p>
    </div>

    <!-- API Config Form (สำหรับผู้ใช้ตั้งค่าครั้งแรก) -->
    <div class="mb-3">
      <label for="api-url-input" class="form-label small text-secondary">
        <i class="fas fa-plug me-1"></i> GAS Web App URL
      </label>
      <input type="text" class="form-control form-control-sm" id="api-url-input" placeholder="https://script.google.com/macros/s/.../exec">
      <div class="form-text small" style="font-size: 0.75rem;">ติดตั้งครั้งแรก กรอกลิงก์ Web App API จาก Google Apps Script</div>
    </div>

    <hr class="my-3">

    <!-- Login Form -->
    <form id="login-form">
      <div class="mb-3">
        <label for="username" class="form-label">ชื่อผู้ใช้งาน</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user text-secondary"></i></span>
          <input type="text" class="form-control" id="username" placeholder="admin หรือ nurse" required>
        </div>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">รหัสผ่าน</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock text-secondary"></i></span>
          <input type="password" class="form-control" id="password" placeholder="กรอกรหัสผ่าน" required>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary-custom w-100 mt-2">
        <i class="fas fa-sign-in-alt me-2"></i>เข้าสู่ระบบ
      </button>
    </form>

    <div class="text-center mt-3">
      <button type="button" class="btn btn-link btn-sm text-decoration-none" id="btn-init-db">
        <i class="fas fa-database me-1"></i> เริ่มต้นตารางฐานข้อมูลใหม่ (Initialize DB)
      </button>
    </div>
  </div>

  <!-- Loading Spinner -->
  <div id="loading-spinner-overlay" class="d-none">
    <div class="spinner-border spinner-custom" role="status">
      <span class="visually-hidden">กำลังโหลด...</span>
    </div>
  </div>

  <!-- JS Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
  <script src="fixes.js"></script>
  
  <script>
    // ดึงค่า URL เดิมถ้าเคยบันทึกไว้ หรือตั้งค่าเริ่มต้นจากผู้ใช้
    const savedUrl = GASApi.getApiUrl();
    document.getElementById('api-url-input').value = savedUrl || "https://script.google.com/macros/s/AKfycbzOITprKzWcOhvgl6ELltxJmhGEjCifJA0ZwdDgqba-gKTP1hswlcnRa1Lithqx6fIs/exec";
  </script>
</body>
</html>
